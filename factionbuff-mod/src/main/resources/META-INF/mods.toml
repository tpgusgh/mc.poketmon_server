[[mods]]
    modId="factionbuff"
    version="1.2.2"
    displayName="Faction Buff"
    authors="mieung.kr"
    description='''
    Multiplies battle EXP for players whose faction (Valor/Mystic/Instinct/Harmony,
    picked on the website) is currently ranked #1 (1.5x) or #2 (1.2x) on the
    faction leaderboard. Also recolors chat messages with a "[진영이름] " prefix
    in that faction's color. Reads per-player data from
    /home/hyunho/player-status-api/faction_boosted_players.txt and
    /home/hyunho/player-status-api/player_factions.txt.
    Also logs every NPC trainer battle win to npc_trainer_wins.log for the
    website's Champion Hall of Fame leaderboard.
    '''

[[dependencies.factionbuff]]
    modId="forge"
    mandatory=true
    versionRange="[36,)"
    ordering="NONE"
    side="SERVER"
[[dependencies.factionbuff]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.16.5,1.17)"
    ordering="NONE"
    side="SERVER"
[[dependencies.factionbuff]]
